<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    .container { max-width: 500px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; }
    .otp-box { background: #1890ff; color: #fff; font-size: 32px; text-align: center; padding: 15px; border-radius: 8px; letter-spacing: 8px; margin: 20px 0; }
    p { color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Password Reset OTP</h2>
    <p>Hi #{name},</p>
    <p>You requested a password reset. Use the OTP below to reset your password. This OTP is valid for 10 minutes.</p>
    <div class="otp-box">#{otp}</div>
    <p>If you didn't request this, please ignore this email.</p>
  </div>
</body>
</html>
